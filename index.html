<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <h1>MY TO-DO LIST</h1>

        <div class="input-group">
            <input type="text" placeholder="Add your task">
            <button>Add</button>
        </div>

        <div class="list-containers">
            <ul>
                <li>
                    <span>Task 1</span>
                    <span class="delete-btn">X</span>
                </li>
                <li>
                    <span>Task 2</span>
                    <span class="delete-btn">X</span>
                </li>
                <li>
                    <span class="completed">Task 3</span>
                    <span class="delete-btn">X</span>
                </li>
            </ul>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
